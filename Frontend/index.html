<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Citizen Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="app">

    <!-- NAVBAR -->
    <header class="navbar">
      <div class="logo">⚡ Citizen Dashboard</div>
    </header>

    <!-- MAIN -->
    <main class="main">

      <section class="hero">
        <h1>Understand Policies, Instantly</h1>
        <p>No legal jargon. Just clear insights.</p>
      </section>

      <!-- UPLOAD CARD -->
      <section class="upload-card">
        <input type="file" id="fileInput" />
        <button id="uploadBtn">Analyze Document</button>
        <p id="status"></p>
      </section>

      <!-- TABS -->
      <section class="tabs">
        <button class="tab active" data-tab="summary">Summary</button>
        <button class="tab" data-tab="impact">Impact</button>
      </section>

      <!-- CONTENT -->
      <section id="summary" class="tab-content active"></section>
      <section id="impact" class="tab-content"></section>

    </main>

  </div>

  <script src="app.js"></script>
</body>
</html>
